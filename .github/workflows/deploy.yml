name: Deploy Nexus

on:
    push:
        branches: [main]

jobs:
    deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - name: Checkout Code
              uses: actions/checkout@v5

            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USER }}
                  key: ${{ secrets.SSH_KEY }}
                  port: ${{ secrets.SSH_PORT }}
                  script: |
                      # ── Load nvm so the correct Node version is available ─────────
                      export NVM_DIR="$HOME/.nvm"
                      [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
                    
                      echo "Node: $(node --version)"
                      echo "npm:  $(npm --version)"

                      # ── Git ────────────────────────────────────────────────────────
                      if ! command -v git &>/dev/null; then
                        sudo apt-get install git -y
                      else
                        echo "Git already installed ($(git --version))"
                      fi

                      # ── PM2 ────────────────────────────────────────────────────────
                      if ! command -v pm2 &>/dev/null; then
                        npm install -g pm2
                      else
                        echo "PM2 already installed ($(pm2 --version))"
                      fi

                      # ── Clone or pull ──────────────────────────────────────────────
                      if [ ! -d "Nexus" ]; then
                        git clone git@github.com:AnAnonymousHB/Nexus.git
                      fi

                      cd Nexus
                      git pull origin main
                    
                      # ── Build ──────────────────────────────────────────────────────
                      npm install
                      npm run build

                      # ── PM2 version sync ───────────────────────────────────────────
                      LOCAL_PM2=$(pm2 --version 2>/dev/null)
                      INMEM_PM2=$(pm2 ping 2>/dev/null | grep -oP '(?<=version: )\S+' || echo "unknown")
                      if [ "$LOCAL_PM2" != "$INMEM_PM2" ]; then
                        echo "PM2 out of sync (local: $LOCAL_PM2, in-memory: $INMEM_PM2), updating..."
                        pm2 update
                      else
                        echo "PM2 in sync ($LOCAL_PM2)"
                      fi

                      # ── Start or restart ───────────────────────────────────────────
                      pm2 describe nexus > /dev/null 2>&1 \
                        && pm2 restart nexus --update-env \
                        || pm2 start dist/index.js --name nexus

                      pm2 save
